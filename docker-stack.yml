  #       constraints:
  #         - "node.role == manager"

# ─────────────────────────────────────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────────────────────────────────────
volumes:
  sigaa-tmp:
    driver: local

# ─────────────────────────────────────────────────────────────────────────────
# Redes
# ─────────────────────────────────────────────────────────────────────────────
networks:
  sigaa-net:
    driver: overlay
    attachable: true                      # permite containers standalone se conectarem

